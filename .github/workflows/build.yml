name: Build e Publicar EXE

on:
  push:
    tags:
      - "v*" # Dispara ao criar tags como v1.0.1

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Compilar com PyInstaller
        # Ajustes: 
        # 1. Usamos main.pyw como entrada
        # 2. Caminho do ícone corrigido para assets/icone.ico
        # 3. Adicionamos a pasta assets ao bundle (--add-data)
        # 4. Nome padronizado para RAE_Turbo
        run: |
          pyinstaller --onefile --noconsole --icon="assets/icone.ico" --add-data "assets;assets" --name="RAE_Turbo" main.pyw

      - name: Publicar Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/RAE_Turbo.exe
          name: "RAE Turbo - ${{ github.ref_name }}"
          body: |
            ## 🚀 Nova versão: ${{ github.ref_name }}
            
            O programa atualizará automaticamente na próxima abertura.
            Se necessário, baixe o `RAE_Turbo.exe` manualmente abaixo.