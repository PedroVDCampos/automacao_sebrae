name: Build e Publicar EXE

# Dispara SOMENTE quando você criar uma tag de versão (ex: v1.0.1)
on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest

    steps:
      # 1. Baixa o código do repositório
      - name: Checkout do repositório
        uses: actions/checkout@v4

      # 2. Configura o Python
      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. Instala as dependências do projeto + PyInstaller
      - name: Instalar dependências
        run: |
          pip install pyinstaller
          pip install -r requirements.txt

      # 4. Compila o .exe com PyInstaller
      #    --onefile     → tudo em um único arquivo
      #    --noconsole   → sem janela de terminal (equivalente ao .pyw)
      #    --icon        → ícone do programa
      #    --name        → nome do arquivo .exe gerado
      - name: Compilar com PyInstaller
        run: |
          pyinstaller --onefile --noconsole --icon=icone.ico --name="RoboSebrae" seu_programa.pyw

      # 5. Publica o .exe como anexo da Release no GitHub
      - name: Publicar Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/RoboSebrae.exe
          name: "Versão ${{ github.ref_name }}"
          body: |
            ## 🚀 Nova versão: ${{ github.ref_name }}

            Baixe o arquivo `RaeTurbo.exe` abaixo para atualizar manualmente,
            ou o programa fará isso automaticamente na próxima abertura.
